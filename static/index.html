<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #1a1a1a; }
    .shell { max-width: 720px; margin: 48px auto; padding: 0 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #007acd; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
    nav { padding: 12px 16px; border-bottom: 1px solid #eee; font-size: 13px; color: #666; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #007acd; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    nav span { margin: 0 4px; color: #ccc; }
    ul { list-style: none; }
    li { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; display: flex; align-items: center; gap: 8px; position: relative; }
    li:last-child { border-bottom: none; }
    li:hover { background: #f8fafc; }
    li a { color: #007acd; text-decoration: none; font-weight: 500; }
    li a:hover { text-decoration: underline; }
    li.file { color: #555; }
    .icon { font-size: 16px; flex-shrink: 0; }
    .empty { padding: 24px 16px; text-align: center; color: #999; font-size: 14px; }
    .upload-btn { background: #007acd; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 8px; }
    .upload-btn:hover { background: #005a9c; }
    .spacer { flex: 1; }
    .download-icon { cursor: pointer; font-size: 14px; opacity: 0.6; }
    .download-icon:hover { opacity: 1; }
    .rename-icon { cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.2s; margin-left: 4px; }
    li:hover .rename-icon { opacity: 0.6; }
    .rename-icon:hover { opacity: 1 !important; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>File Browser</h1>
    <div id="app" class="card"></div>
    <input type="file" id="fileInput" style="display:none" multiple onchange="uploadFile()">
  </div>
  <script src="app.js"></script>
</body>
</html>
